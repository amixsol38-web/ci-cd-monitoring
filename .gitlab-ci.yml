stages:
  - build
  - push
  - test
  - deploy

variables:
  DOCKER_TLS_CERTDIR: ""
  REGISTRY_IMAGE: "$CI_REGISTRY_IMAGE"
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"

build_backend:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - docker build -t "$REGISTRY_IMAGE/backend:$IMAGE_TAG" ./backend
    - docker save "$REGISTRY_IMAGE/backend:$IMAGE_TAG" -o backend.tar
  artifacts:
    paths: [backend.tar]
    expire_in: 1 hour

build_frontend:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - docker build -t "$REGISTRY_IMAGE/frontend:$IMAGE_TAG" ./frontend
    - docker save "$REGISTRY_IMAGE/frontend:$IMAGE_TAG" -o frontend.tar
  artifacts:
    paths: [frontend.tar]
    expire_in: 1 hour

build_haproxy:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - docker build -t "$REGISTRY_IMAGE/haproxy:$IMAGE_TAG" ./haproxy
    - docker save "$REGISTRY_IMAGE/haproxy:$IMAGE_TAG" -o haproxy.tar
  artifacts:
    paths: [haproxy.tar]
    expire_in: 1 hour

push_images:
  stage: push
  image: docker:27
  services:
    - docker:27-dind
  needs:
    - build_backend
    - build_frontend
    - build_haproxy
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker load -i backend.tar
    - docker load -i frontend.tar
    - docker load -i haproxy.tar
    - docker push "$REGISTRY_IMAGE/backend:$IMAGE_TAG"
    - docker push "$REGISTRY_IMAGE/frontend:$IMAGE_TAG"
    - docker push "$REGISTRY_IMAGE/haproxy:$IMAGE_TAG"
    - docker tag "$REGISTRY_IMAGE/backend:$IMAGE_TAG" "$REGISTRY_IMAGE/backend:latest"
    - docker tag "$REGISTRY_IMAGE/frontend:$IMAGE_TAG" "$REGISTRY_IMAGE/frontend:latest"
    - docker tag "$REGISTRY_IMAGE/haproxy:$IMAGE_TAG" "$REGISTRY_IMAGE/haproxy:latest"
    - docker push "$REGISTRY_IMAGE/backend:latest"
    - docker push "$REGISTRY_IMAGE/frontend:latest"
    - docker push "$REGISTRY_IMAGE/haproxy:latest"

smoke_test_compose:
  stage: test
  image: docker:27
  services:
    - docker:27-dind
  needs:
    - build_backend
    - build_frontend
    - build_haproxy
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - apk add --no-cache curl
  script:
    - docker load -i backend.tar
    - docker load -i frontend.tar
    - docker load -i haproxy.tar
    - |
      cat > .env <<EOF
      DB_NAME=shop
      DB_USER=shop_user
      DB_PASSWORD=shop_password
      REGISTRY_IMAGE=${REGISTRY_IMAGE}
      IMAGE_TAG=${IMAGE_TAG}
      EOF
    - |
      cat > docker-compose.ci.yml <<EOF
      services:
        backend:
          image: ${REGISTRY_IMAGE}/backend:${IMAGE_TAG}
        frontend:
          image: ${REGISTRY_IMAGE}/frontend:${IMAGE_TAG}
        haproxy:
          image: ${REGISTRY_IMAGE}/haproxy:${IMAGE_TAG}
          ports:
            - "18080:8080"
            - "18404:8404"
      EOF
    - docker compose --env-file .env -f docker-compose-prod.yml -f docker-compose.ci.yml config
    - docker compose --env-file .env -f docker-compose-prod.yml -f docker-compose.ci.yml up -d
    - |
      echo "Waiting for end-to-end stack via HAProxy ..."
      for i in $(seq 1 60); do
        if curl -fsS http://127.0.0.1:18080/actuator/health | grep -q '"status":"UP"'; then
          break
        fi
        sleep 2
      done
      curl -fsS http://127.0.0.1:18080/ | grep -qi '<!doctype html'
      curl -fsS http://127.0.0.1:18080/api/products/ | grep -q '\['
  after_script:
    - docker compose --env-file .env -f docker-compose-prod.yml -f docker-compose.ci.yml down -v || true

deploy_staging:
  stage: deploy
  tags: ["runner"]
  needs:
    - push_images
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  environment:
    name: staging
  image: docker:27
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - |
      cat > .env <<EOF
      DB_NAME=${DB_NAME}
      DB_USER=${DB_USER}
      DB_PASSWORD=${DB_PASSWORD}
      REGISTRY_IMAGE=${CI_REGISTRY_IMAGE}
      IMAGE_TAG=${CI_COMMIT_SHORT_SHA}
      EOF
    - docker info
    - docker ps
    - docker compose -f docker-compose-prod.yml --env-file .env pull
    - docker compose -f docker-compose-prod.yml --env-file .env up -d --remove-orphans
    - docker compose -f docker-compose-prod.yml --env-file .env ps

deploy_prod:
  stage: deploy
  tags: ["runner"]
  needs:
    - push_images
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: false
  environment:
    name: production
  image: docker:27
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - |
      cat > .env <<EOF
      DB_NAME=${DB_NAME}
      DB_USER=${DB_USER}
      DB_PASSWORD=${DB_PASSWORD}
      REGISTRY_IMAGE=${CI_REGISTRY_IMAGE}
      IMAGE_TAG=${CI_COMMIT_SHORT_SHA}
      EOF
    - docker info
    - docker ps
    - docker compose -f docker-compose-prod.yml --env-file .env pull
    - docker compose -f docker-compose-prod.yml --env-file .env up -d --remove-orphans
    - docker compose -f docker-compose-prod.yml --env-file .env ps
