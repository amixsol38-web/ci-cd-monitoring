stages:
  - build
  - push
  - test
  - deploy

variables:
  DOCKER_TLS_CERTDIR: ""
  REGISTRY_IMAGE: "$CI_REGISTRY_IMAGE"
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"

# -------------------- BUILD --------------------
build_backend:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - docker build -t "$REGISTRY_IMAGE/backend:$IMAGE_TAG" ./backend
    - docker save "$REGISTRY_IMAGE/backend:$IMAGE_TAG" -o backend.tar
  artifacts:
    paths: [backend.tar]
    expire_in: 1 hour

build_frontend:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - docker build -t "$REGISTRY_IMAGE/frontend:$IMAGE_TAG" ./frontend
    - docker save "$REGISTRY_IMAGE/frontend:$IMAGE_TAG" -o frontend.tar
  artifacts:
    paths: [frontend.tar]
    expire_in: 1 hour

# -------------------- PUSH --------------------
push_images:
  stage: push
  image: docker:27
  services:
    - docker:27-dind
  needs:
    - build_backend
    - build_frontend
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"

    - docker load -i backend.tar
    - docker load -i frontend.tar

    - docker push "$REGISTRY_IMAGE/backend:$IMAGE_TAG"
    - docker push "$REGISTRY_IMAGE/frontend:$IMAGE_TAG"

    - docker tag "$REGISTRY_IMAGE/backend:$IMAGE_TAG" "$REGISTRY_IMAGE/backend:latest"
    - docker tag "$REGISTRY_IMAGE/frontend:$IMAGE_TAG" "$REGISTRY_IMAGE/frontend:latest"

    - docker push "$REGISTRY_IMAGE/backend:latest"
    - docker push "$REGISTRY_IMAGE/frontend:latest"

# -------------------- SMOKE TEST (CI) --------------------
smoke_test_compose:
  stage: test
  image: docker:27
  services:
    - docker:27-dind
  needs:
    - build_backend
    - build_frontend
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - apk add --no-cache curl
  script:
    # используем локально собранные образы, compose не билдит заново
    - docker load -i backend.tar
    - docker load -i frontend.tar

    # учебный .env (для тестового поднятия)
    - |
      cat > .env <<EOF
      DB_NAME=shop
      DB_USER=shop_user
      DB_PASSWORD=shop_password
      EOF

    # override: подставляем правильные image теги
    - |
      cat > docker-compose.ci.yml <<EOF
      services:
        backend:
          image: ${REGISTRY_IMAGE}/backend:${IMAGE_TAG}
        frontend:
          image: ${REGISTRY_IMAGE}/frontend:${IMAGE_TAG}
      EOF

    - docker compose -f docker-compose.yaml -f docker-compose.ci.yml config
    - docker compose -f docker-compose.yaml -f docker-compose.ci.yml up -d

    - |
      echo "Waiting for backend /actuator/health ..."
      for i in $(seq 1 30); do
        if docker ps --format '{{.Names}}' | grep -q backend; then
          docker exec "$(docker ps -qf name=backend)" curl -fsS http://localhost:8080/actuator/health && exit 0 || true
        fi
        sleep 2
      done
      echo "Backend did not become healthy in time"
      docker compose -f docker-compose.yaml -f docker-compose.ci.yml ps
      docker compose -f docker-compose.yaml -f docker-compose.ci.yml logs --no-color --tail=200
      exit 1

  after_script:
    - docker compose -f docker-compose.yaml -f docker-compose.ci.yml down -v || true

# -------------------- DEPLOY STAGING (REAL SERVER) --------------------
deploy_staging:
  stage: deploy
  tags: ["runner"]
  needs:
    - push_images
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  environment:
    name: staging
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker compose -f /home/aleks/cicd-graf/1917/docker-compose-prod.yml --env-file /home/aleks/cicd-graf/1917/.env pull
    - docker compose -f /home/aleks/cicd-graf/1917/docker-compose-prod.yml --env-file /home/aleks/cicd-graf/1917/.env up -d
    - docker compose -f /home/aleks/cicd-graf/1917/docker-compose-prod.yml ps

# -------------------- DEPLOY PROD (MANUAL) --------------------
deploy_prod:
  stage: deploy
  tags: ["runner"]
  needs:
    - push_images
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: false
  environment:
    name: production
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker compose -f /home/aleks/cicd-graf/1917/docker-compose-prod.yml --env-file /home/aleks/cicd-graf/1917/.env pull
    - docker compose -f /home/aleks/cicd-graf/1917/docker-compose-prod.yml --env-file /home/aleks/cicd-graf/1917/.env up -d
    - docker compose -f /home/aleks/cicd-graf/1917/docker-compose-prod.yml ps