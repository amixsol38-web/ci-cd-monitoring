stages:
  - build
  - push
  - deploy

variables:
  DOCKER_TLS_CERTDIR: ""
  REGISTRY_IMAGE: "$CI_REGISTRY_IMAGE"
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"

# ---------- BUILD ----------
build_backend:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  script:
    - docker build -t "$REGISTRY_IMAGE/backend:$IMAGE_TAG" ./backend
    - docker save "$REGISTRY_IMAGE/backend:$IMAGE_TAG" -o backend.tar
  artifacts:
    paths:
      - backend.tar
    expire_in: 1 hour
  only:
    - main

build_frontend:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  script:
    - docker build -t "$REGISTRY_IMAGE/frontend:$IMAGE_TAG" ./frontend
    - docker save "$REGISTRY_IMAGE/frontend:$IMAGE_TAG" -o frontend.tar
  artifacts:
    paths:
      - frontend.tar
    expire_in: 1 hour
  only:
    - main

# ---------- PUSH ----------
push_images:
  stage: push
  image: docker:27
  services:
    - docker:27-dind
  needs:
    - build_backend
    - build_frontend
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker load -i backend.tar
    - docker load -i frontend.tar
    - docker push "$REGISTRY_IMAGE/backend:$IMAGE_TAG"
    - docker push "$REGISTRY_IMAGE/frontend:$IMAGE_TAG"
    - docker tag "$REGISTRY_IMAGE/backend:$IMAGE_TAG" "$REGISTRY_IMAGE/backend:latest"
    - docker tag "$REGISTRY_IMAGE/frontend:$IMAGE_TAG" "$REGISTRY_IMAGE/frontend:latest"
    - docker push "$REGISTRY_IMAGE/backend:latest"
    - docker push "$REGISTRY_IMAGE/frontend:latest"
  only:
    - main

# ---------- DEPLOY (LOCAL IN CI) ----------
deploy_local_compose:
  stage: deploy
  image: docker:27
  services:
    - docker:27-dind
  needs:
    - build_backend
    - build_frontend
  before_script:
    - apk add --no-cache curl
  script:
    # грузим образы, чтобы compose НЕ пытался их билдить заново
    - docker load -i backend.tar
    - docker load -i frontend.tar

    # создаём .env прямо в CI (учебные значения)
    - |
      cat > .env <<EOF
      DB_NAME=shop
      DB_USER=shop_user
      DB_PASSWORD=shop_password
      EOF

    # (важно) твой compose сейчас использует image: shop_backend/shop_frontend
    # а мы собрали $REGISTRY_IMAGE/backend и $REGISTRY_IMAGE/frontend
    # поэтому используем override для CI
    - |
      cat > docker-compose.ci.yml <<EOF
      services:
        backend:
          image: ${REGISTRY_IMAGE}/backend:${IMAGE_TAG}
        frontend:
          image: ${REGISTRY_IMAGE}/frontend:${IMAGE_TAG}
      EOF

    # проверка, что compose валиден
    - docker compose -f docker-compose.yaml -f docker-compose.ci.yml config

    # поднимаем стек в CI
    - docker compose -f docker-compose.yaml -f docker-compose.ci.yml up -d

    # ждём, что backend жив (actuator)
    - |
      echo "Waiting for backend..."
      for i in $(seq 1 30); do
        if docker ps --format '{{.Names}}' | grep -q backend; then
          # пробуем health endpoint через внутреннюю сеть docker compose
          # проще: curl из haproxy или из самого backend контейнера
          docker exec "$(docker ps -qf name=backend)" curl -fsS http://localhost:8080/actuator/health && break || true
        fi
        sleep 2
      done

    # показать статусы и логи для дебага
    - docker compose -f docker-compose.yaml -f docker-compose.ci.yml ps
    - docker compose -f docker-compose.yaml -f docker-compose.ci.yml logs --no-color --tail=200

  after_script:
    - docker compose -f docker-compose.yaml -f docker-compose.ci.yml down -v || true
  only:
    - main
