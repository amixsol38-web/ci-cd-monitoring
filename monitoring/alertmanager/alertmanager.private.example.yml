global:
  resolve_timeout: 5m

route:
  receiver: telegram
  group_by: ["alertname", "job"]
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 1h

receivers:
  - name: telegram
    telegram_configs:
      - bot_token: "REPLACE_WITH_TELEGRAM_BOT_TOKEN"
        chat_id: 123456789
        send_resolved: true
