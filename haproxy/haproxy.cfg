global
  log stdout format raw local0
  maxconn 2048

defaults
  log global
  mode http
  option httplog
  timeout connect 5s
  timeout client  30s
  timeout server  30s

resolvers docker
  nameserver dns 127.0.0.11:53
  resolve_retries 3
  timeout resolve 1s
  timeout retry   1s
  hold valid      10s

frontend fe_http
  bind :8080

  # API / Health -> backend
  acl is_actuator path_beg /actuator
  acl is_api      path_beg /api
  use_backend be_api if is_actuator or is_api

  # всё остальное -> frontend
  default_backend be_frontend

backend be_api
  balance roundrobin
  option httpchk GET /actuator/health
  http-check expect status 200
  server-template srv 1-10 backend:8080 check resolvers docker init-addr none

backend be_frontend
  option httpchk GET /
  http-check expect status 200
  server frontend frontend:80 check resolvers docker init-addr none

listen stats
  bind :8404
  mode http
  stats enable
  stats uri /
  stats refresh 5s
  stats auth admin:admin


