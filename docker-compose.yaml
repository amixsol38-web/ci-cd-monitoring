services:
  backend:
    image: shop_backend
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_ELASTICSEARCH_URIS: http://search:9200
    depends_on:
      db:
        condition: service_healthy
      search:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'bash -c ''exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e "GET /actuator/health HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3 && cat <&3 | grep -q UP'''
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - shop-net

  haproxy:
    image: shop_haproxy
    build:
      context: ./haproxy
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8404:8404"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - shop-net

  frontend:
    image: shop_frontend
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      BACKEND_HOST: haproxy
      BACKEND_PORT: 8080
    depends_on:
      haproxy:
        condition: service_started
    read_only: true
    tmpfs:
      - /etc/nginx/conf.d
      - /var/cache/nginx
      - /var/run
    networks:
      - shop-net

  db:
    image: postgres:16.0
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shop-net

  search:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.22
    restart: unless-stopped
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'bash -c ''exec 3<>/dev/tcp/127.0.0.1/9200 && echo -e "GET /_cluster/health HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3 && cat <&3 | grep -qE "\"status\":\"(green|yellow)\""'''
        ]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 40s
    networks:
      - shop-net

networks:
  shop-net:
    driver: bridge
    name: shop-net

volumes:
  db-data:
  es-data:
